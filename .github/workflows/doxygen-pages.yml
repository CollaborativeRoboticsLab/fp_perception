name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - Doxygen
      - README.md
      - '**/package.xml'
      - docs/**
      - '**/*.md'
      - '**/*.dox'
      - '**/*.h'
      - '**/*.hh'
      - '**/*.hpp'
      - '**/*.hxx'
      - '**/*.c'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.cxx'
      - '**/*.py'
      - .github/workflows/doxygen-pages.yml
  pull_request:
    branches:
      - main
    paths:
      - Doxygen
      - README.md
      - '**/package.xml'
      - docs/**
      - '**/*.md'
      - '**/*.dox'
      - '**/*.h'
      - '**/*.hh'
      - '**/*.hpp'
      - '**/*.hxx'
      - '**/*.c'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.cxx'
      - '**/*.py'
      - .github/workflows/doxygen-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check package versions
        run: |
          python3 <<'PY'
          import re
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path('.')
          package_files = sorted(root.glob('**/package.xml'))

          if not package_files:
            print('No package.xml files found.')
            sys.exit(1)

          versions = {}
          invalid = []
          semver_re = re.compile(r'^\d+\.\d+\.\d+$')

          for pkg_file in package_files:
            tree = ET.parse(pkg_file)
            package = tree.getroot()
            name = package.findtext('name', '').strip()
            version = package.findtext('version', '').strip()

            if not name or not version:
              invalid.append((str(pkg_file), name or '<missing name>', version or '<missing version>'))
              continue

            if not semver_re.match(version):
              invalid.append((str(pkg_file), name, version))
              continue

            versions[name] = version

          if invalid:
            print('Invalid package metadata found:')
            for path, name, version in invalid:
              print(f'  - {path}: name={name}, version={version}')
            sys.exit(1)

          unique_versions = sorted(set(versions.values()))

          print('Discovered package versions:')
          for name, version in sorted(versions.items()):
            print(f'  - {name}: {version}')

          if len(unique_versions) != 1:
            print('\nVersion mismatch detected across package.xml files.')
            print('Unique versions found:', ', '.join(unique_versions))
            sys.exit(1)

          print(f'\nAll package.xml files use version {unique_versions[0]}.')
          PY

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Build HTML documentation
        run: |
          doxygen Doxygen
          touch docs/html/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4