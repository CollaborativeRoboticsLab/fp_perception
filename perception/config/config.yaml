/**:
  ros__parameters:
    # Server behavior
    run_tests: true

    # Which plugin groups to load
    use_vision_driver: false
    use_microphone_driver: true
    use_speaker_driver: true
    use_transcription_driver: true
    use_sentiment_driver: true
    use_speech_driver: true

    # Pluginlib class selection
    ros_vision_driver: perception::DefaultDriver
    non_ros_vision_driver: perception::OpenCVDriver
    microphone_driver: perception::MicrophoneAudioDriver
    speaker_driver: perception::SpeakerAudioDriver
    transcription_driver: perception::OpenAIDriver
    sentiment_driver: perception::SentimentDriver
    speech_synthesis_driver: perception::OpenAISpeechDriver

    # ROS interface configuration
    interface:
      audio_input:
        publish: false
        topic: perception/microphone
        frame_id: microphone_frame
        frequency: 10

      audio_output:
        subscribe: false
        topic: perception/speaker

      transcription:
        provide_service: false
        service: perception/transcription
        buffer_duration: 10

      speech:
        provide_service: false
        service_name: perception/speech

      sentiment:
        provide_service: false
        service_name: perception/sentiment_analysis

      vision_input:
        publish: false
        topic: perception/camera
        frame_id: camera_frame
        frequency: 10
        non_ros: false

    # Plugin parameters (nested maps map to dot-separated ROS parameters)
    driver:
      vision:
        DefaultDriver:
          name: DefaultDriver
          topic: /camera/raw

        OpenCVDriver:
          name: OpenCVDriver
          device_id: 0

      audio:
        MicrophoneAudioDriver:
          name: MicrophoneAudioDriver
          device_name: "AM-4136"
          chunk_size: 192000 # number of frames per audio buffer processing cycle.will give inputoverflowed error if too small
          sample_rate: 192000 # number of samples per second
          channels: 1 # number of audio channels
          buffer_time: 10 # buffering time in seconds

        SpeakerAudioDriver:
          name: SpeakerAudioDriver
          device_name: "ALC285 Analog"
          sample_rate: 48000
          channels: 2
          test_file_path: test/mic_test.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-1.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-2.wav

      transcription:
        OpenAIDriver:
          name: OpenAIDriver
          model: whisper-1   # gpt-4o-transcribe
          # test_file_path: test/mic_test.wav
          test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-1.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-2.wav
          rest:
            uri: https://api.openai.com/v1/audio/transcriptions
            method: POST
            auth_type: Bearer
            ssl_verify: true

      sentiment:
        SentimentDriver:
          name: SentimentDriver
          rest:
            uri: https://router.huggingface.co/hf-inference/models/distilbert/distilbert-base-uncased-finetuned-sst-2-english
            method: POST
            auth_type: Bearer
            ssl_verify: true

      speech:
        OpenAISpeechDriver:
          name: OpenAISpeechDriver
          model: gpt-4o-mini-tts
          test_text: "Hello this is a test speech for ROS2 perception speech driver."
          test_file_path: test/speech.wav
          voice: coral
          instructions: "Please speak clearly and slowly."
          rest:
            uri: https://api.openai.com/v1/audio/speech
            method: POST
            auth_type: Bearer
            ssl_verify: true

    algorithm:
      GazeAlgorithm:
        name: EyeGazeDetection
        calibration:
          time: 10.0
          sample_size: 300
          angle_tolerance: 15.0
        detection:
          attention_threshold: 0.5
          pitch_threshold: 15.0
          yaw_threshold: 20.0
          history_size: 10
          # model_path: facial_landmarks.pth  # overridden via launch file
          debug_mode: true

      ContextAlgorithm:
        name: ContextIdentification
        MFCCExtractor:
          sample_rate: 44100
          n_mfcc: 40
          fft_size: 2048
          hop_length: 512
          fixed_length: 200
        # AmbientDetector:
        # model_path: ambient_model.pth # overridden via launch file

        model_path: context_model.pth
        detection:
          confidence_threshold: 0.7
          history_size: 5
          debug_mode: true
