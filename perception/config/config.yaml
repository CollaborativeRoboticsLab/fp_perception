# config for perception drivers
# This file is used to configure the parameters for the perception drivers in the perception system.
/**:
  ros__parameters:
    run_tests: true
    use_vision_driver: false
    use_microphone_driver: false
    use_speaker_driver: false
    use_transcription_driver: false
    use_sentiment_driver: false
    use_speech_driver: true

    use_eye_gaze_algorithm: false
    use_context_identification_algorithm: false

    # Uncomment the following lines to enable the respective drivers
    # vision_driver: perception::DefaultDriver                          # Default ROS driver for vision
    vision_driver: perception::OpenCVDriver # OpenCV driver for vision
    microphone_driver: perception::MicrophoneAudioDriver # Driver for microphone audio
    speaker_driver: perception::SpeakerAudioDriver # Driver for speaker audio
    transcription_driver: perception::OpenAIDriver # Driver for audio transcription
    sentiment_analysis_driver: perception::SentimentDriver # Driver for sentiment analysis
    speech_synthesis_driver: perception::OpenAISpeechDriver # Driver for speech synthesis

    eye_gaze_algorithm: perception::GazeAlgorithm # Algorithm for eye gaze detection
    context_identification_algorithm: perception::ContextAlgorithm # Algorithm for context identification

    driver:
      vision:
        DefaultDriver:
          name: DefaultDriver
          topic: /camera/image_raw

        OpenCVDriver:
          name: OpenCVDriver
          device_id: 0
          publish: true
          topic: /camera/image_raw
          frame_id: camera_frame
          frequency: 30.0

      audio:
        MicrophoneAudioDriver:
          name: MicrophoneAudioDriver
          device_name: default
          publish: true
          topic: /audio/microphone
          frame_id: microphone_frame
          chunk_size: 48000 # number of frames per audio buffer processing cycle.will give inputoverflowed error if too small
          sample_rate: 48000 # number of samples per second
          channels: 2 # number of audio channels
          buffer_time: 10 # buffering time in seconds

        SpeakerAudioDriver:
          name: SpeakerAudioDriver
          device_name: default # use default audio output device
          subscribe: true
          topic: /audio/speaker
          frame_id: speaker_frame
          sample_rate: 48000
          channels: 2
          test_file_path: test/mic_test.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-1.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-2.wav

      transcription:
        OpenAIDriver:
          name: OpenAIDriver
          # model: gpt-4o-transcribe
          model: whisper-1
          # test_file_path: test/mic_test.wav
          test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-1.wav
          # test_file_path: install/perception_driver_audio/share/perception_driver_audio/audio/hello-2.wav
          rest:
            uri: https://api.openai.com/v1/audio/transcriptions
            method: POST
            auth_type: Bearer
            ssl_verify: true

      sentiment:
        SentimentDriver:
          name: SentimentDriver
          service_name: sentiment_analysis
          provide_service: true  
          rest:
            uri: https://router.huggingface.co/hf-inference/models/distilbert/distilbert-base-uncased-finetuned-sst-2-english
            method: POST
            auth_type: Bearer
            ssl_verify: true

      speech:
        OpenAISpeechDriver:
          name: OpenAISpeechDriver
          model: gpt-4o-mini-tts
          test_text: "Hello, this is a test of the OpenAI speech synthesis driver."
          test_file_path: test/speech_test.wav
          voice: sage
          instructions: "Speak clearly and at a moderate pace."
          provide_service: true
          service_name: perception/speech
          rest:
            uri: https://api.openai.com/v1/audio/speech
            method: POST
            auth_type: Bearer
            ssl_verify: true

    algorithm:
      GazeAlgorithm:
        name: EyeGazeDetection
        calibration:
          time: 10.0
          sample_size: 300
          angle_tolerance: 15.0
        detection:
          attention_threshold: 0.5
          pitch_threshold: 15.0
          yaw_threshold: 20.0
          history_size: 10
          # model_path: facial_landmarks.pth  # overridden via launch file
          debug_mode: true

      ContextAlgorithm:
        name: ContextIdentification
        MFCCExtractor:
          sample_rate: 44100
          n_mfcc: 40
          fft_size: 2048
          hop_length: 512
          fixed_length: 200
        # AmbientDetector:
        # model_path: ambient_model.pth # overridden via launch file

        model_path: context_model.pth
        detection:
          confidence_threshold: 0.7
          history_size: 5
          debug_mode: true
